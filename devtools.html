<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>HTML Edit Saver</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      margin: 0;
      padding: 12px;
      background: #1e1e1e;
      color: #d4d4d4;
    }
    h3 { margin: 0 0 10px; color: #fff; font-size: 13px; }
    button {
      background: #0e7a0e;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 7px 14px;
      cursor: pointer;
      font-size: 13px;
      width: 100%;
    }
    button:hover { background: #116e11; }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #9cdcfe;
      min-height: 18px;
    }
    #instructions {
      font-size: 11px;
      color: #808080;
      margin-top: 12px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h3>💾 HTML Edit Saver</h3>
  <button id="saveBtn">Save Current Page Edits</button>
  <div id="status"></div>
  <div id="instructions">
    1. Edit the HTML in the Elements panel<br>
    2. Click "Save" to store your changes<br>
    3. Edits auto-apply on every page load
  </div>
  <script src="devtools_panel.js"></script>
</body>
</html>
